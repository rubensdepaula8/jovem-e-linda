<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estúdio Jovem e Linda - Agendamento</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
        }

        .logo-box {
            margin-bottom: 30px;
        }

        .logo {
            max-width: 220px;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.15);
        }

        .status-text {
            font-size: 1.1rem;
            color: #b3b3b3;
            margin-bottom: 25px;
            font-weight: 300;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(212, 175, 55, 0.1);
            border-radius: 50%;
            border-top-color: #d4af37;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-action {
            display: inline-block;
            padding: 14px 28px;
            background-color: #d4af37;
            color: #0b0b0b;
            text-decoration: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            margin-top: 10px;
            text-transform: uppercase;
        }

        .btn-action:hover {
            background-color: #f3cd46;
            transform: translateY(-2px);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box">
            <img src="logo.png" alt="Estúdio Jovem e Linda" class="logo">
        </div>
        
        <div id="loading-area">
            <div class="spinner"></div>
            <p class="status-text">Abrindo o aplicativo de agendamento...</p>
        </div>

        <div id="error-area" class="hidden">
            <p class="status-text">O seu navegador bloqueou a abertura automática.</p>
            <a href="#" onclick="dispararApp(event)" class="btn-action">
                ABRIR NO APLICATIVO
            </a>
        </div>
    </div>

    <script>
        const appUrlAndroid = "intent://www.trinks.com/jovemelinda#Intent;scheme=https;package=br.com.trinks.cliente;end";
        const appUrlApple = "trinks://www.trinks.com/jovemelinda";

        function obterLinkCorreto() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                return appUrlApple;
            }
            return appUrlAndroid;
        }

        function dispararApp(e) {
            if (e) e.preventDefault();
            window.location.href = obterLinkCorreto();
        }

        function iniciarRedirecionamento() {
            dispararApp();
            
            setTimeout(() => {
                document.getElementById('loading-area').classList.add('hidden');
                document.getElementById('error-area').classList.remove('hidden');
            }, 5000); // Alteração: 5 segundos em vez de 2
        }

        window.onload = iniciarRedirecionamento;
    </script>
</body>
</html>
