<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estúdio Jovem e Linda - Agendamento</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .logo-box {
            position: relative;
            margin-bottom: 30px;
        }

        .logo {
            max-width: 250px;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .status-text {
            font-size: 1.1rem;
            color: #b3b3b3;
            margin-bottom: 25px;
            font-weight: 300;
        }

        /* Spinner de carregamento elegante */
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(212, 175, 55, 0.1);
            border-radius: 50%;
            border-top-color: #d4af37;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 30px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Botão de segurança caso falhe */
        .btn-fallback {
            display: inline-block;
            padding: 12px 24px;
            background-color: transparent;
            color: #d4af37;
            border: 1px solid #d4af37;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            opacity: 0; /* Começa invisível e aparece se demorar */
            animation: fadeIn 2s forwards;
            animation-delay: 2s; 
        }

        .btn-fallback:hover {
            background-color: #d4af37;
            color: #0b0b0b;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box">
            <img src="logo.png" alt="Estúdio Jovem e Linda" class="logo">
        </div>
        
        <div class="spinner" id="spinner"></div>
        <p class="status-text" id="status">Redirecionando para o agendamento...</p>
        
        <a href="https://www.trinks.com/jovemelinda" class="btn-fallback" id="fallback-btn">
            Clique aqui se não for redirecionado
        </a>
    </div>

    <script>
        const appUrl = "intent://www.trinks.com/jovemelinda#Intent;scheme=https;package=com.trinks.trinksmobile;end";
        const webUrl = "https://www.trinks.com/jovemelinda";

        // Função principal para tentar o redirecionamento
        function tentarRedirecionar() {
            const inicio = Date.now();
            
            // Tenta abrir o app usando a Intent do Android
            window.location.href = appUrl;

            // Se o app não abrir em 2.5 segundos, joga o usuário para o site do Trinks
            setTimeout(() => {
                // Verifica se a página ainda está em foco (se o app abriu, o foco muda e o tempo gasto é maior)
                if (Date.now() - inicio < 3000) {
                    window.location.href = webUrl;
                }
            }, 2500);
        }

        // Executa ao carregar a página
        window.onload = tentarRedirecionar;
    </script>
</body>
</html>
