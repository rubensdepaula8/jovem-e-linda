<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estúdio Jovem e Linda - Agendamento</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
        }

        .logo-box {
            margin-bottom: 30px;
        }

        .logo {
            max-width: 220px;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.15);
        }

        .status-text {
            font-size: 1.1rem;
            color: #b3b3b3;
            margin-bottom: 25px;
            font-weight: 300;
        }

        /* Spinner de carregamento */
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(212, 175, 55, 0.1);
            border-radius: 50%;
            border-top-color: #d4af37;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Botão de segurança (fallback) */
        .btn-fallback {
            display: inline-block;
            padding: 12px 24px;
            background-color: transparent;
            color: #d4af37;
            border: 1px solid #d4af37;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            opacity: 0; 
            animation: fadeIn 1.5s forwards;
            animation-delay: 2s; /* Aparece após 2 segundos se falhar */
        }

        .btn-fallback:hover {
            background-color: #d4af37;
            color: #0b0b0b;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box">
            <img src="logo.png" alt="Estúdio Jovem e Linda" class="logo">
        </div>
        
        <div class="spinner" id="spinner"></div>
        <p class="status-text" id="status">Abrindo o seu agendamento...</p>
        
        <a href="https://www.trinks.com/jovemelinda" class="btn-fallback" id="fallback-btn">
            Clique aqui para agendar na Web
        </a>
    </div>

    <script>
        // Configuração das URLs - Ajuste aqui se o nome final da URL do seu Trinks for diferente
        const linkDoEstudio = "jovemelinda"; 

        const appUrl = `intent://www.trinks.com/${linkDoEstudio}#Intent;scheme=https;package=com.trinks.trinksmobile;end`;
        const webUrl = `https://www.trinks.com/${linkDoEstudio}`;

        function tentarRedirecionar() {
            const tempoInicial = Date.now();
            
            // 1. Tenta forçar a abertura do aplicativo Trinks
            window.location.href = appUrl;

            // 2. Se passar 2.5 segundos e a página continuar aberta, joga para o site correto
            setTimeout(() => {
                // Se o tempo decorrido for curto, significa que o usuário continuou na página (o app não abriu)
                if (Date.now() - tempoInicial < 3000) {
                    window.location.href = webUrl;
                }
            }, 2500);
        }

        // Executa a lógica assim que a página carrega
        window.onload = tentarRedirecionar;
    </script>
</body>
</html>
